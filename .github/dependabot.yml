version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      types:
        patterns:
          - "@types/*"
      dev:
        dependency-type: development
    ignore:
      # eslint 10.x breaks eslint-plugin-react (used by eslint-config-next).
      # Re-enable once the plugin supports the v10 rule API.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # typescript 6.0 is fresh — hold until the major-version ecosystem settles.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
